name: Run Vertex Mock SDK Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout Code from GitHub
      uses: actions/checkout@v4

    - name: 2. Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: 3. Install Test Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    - name: 4. Execute Test Suite using Mocks
      env:
        ENVIRONMENT: CI
        MOCK_VERTEX: "true"
      run: |
        PYTHONPATH=. pytest tests/ -v --log-cli-level=INFO
